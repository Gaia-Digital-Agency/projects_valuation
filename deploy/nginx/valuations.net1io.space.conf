server {
    server_name valuations.net1io.space;

    root /var/www/valuations/frontend/dist;
    index index.html;

    # Future backend API proxy (port 3020)
    location /api/ {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/valuations.access.log;
    error_log  /var/log/nginx/valuations.error.log;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/valuations.net1io.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/valuations.net1io.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = valuations.net1io.space) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name valuations.net1io.space;
    return 404; # managed by Certbot


}